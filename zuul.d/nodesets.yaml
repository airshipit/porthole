- nodeset:
    name: porthole-5nodes-ubuntu_jammy
    nodes:
      - name: primary
        label: ubuntu-jammy
      - name: node-1
        label: ubuntu-jammy
      - name: node-2
        label: ubuntu-jammy
      - name: node-3
        label: ubuntu-jammy
      - name: node-4
        label: ubuntu-jammy
    groups:
      - name: primary
        nodes:
          - primary
      - name: nodes
        nodes:
          - node-1
          - node-2
          - node-3
          - node-4
      - name: k8s_cluster
        nodes:
          - primary
          - node-1
          - node-2
          - node-3
          - node-4
      - name: k8s_control_plane
        nodes:
          - primary
      - name: k8s_nodes
        nodes:
          - node-1
          - node-2
          - node-3
          - node-4

- nodeset:
    name: airship-porthole-single-node
    nodes:
      - name: primary
        label: ubuntu-bionic

- nodeset:
    name: airship-porthole-jammy-single-node
    nodes:
      - name: primary
        label: ubuntu-jammy
