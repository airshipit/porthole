- hosts: all

  roles:
    - ensure-docker
    - ensure-python
    - ensure-pip

  tasks:
    - include_vars: vars.yaml

    - name: Debug inputs
      block:
        - debug:
            var: distro_suffix
        - debug:
            var: image_name
        - debug:
            var: publish
        - debug:
            var: tags
        - debug:
            var: zuul
        - debug:
            msg: "{{ tags | to_json }}"

    - name: Determine tags
      shell: echo '{{ tags | to_json }}' | python3 {{ zuul.project.src_dir }}/tools/image_tags.py
      environment:
        BRANCH: "{{ zuul.branch | default('') }}"
        CHANGE: "{{ zuul.change | default('') }}"
        COMMIT: "{{ zuul.newrev | default('') }}"
        PATCHSET: "{{ zuul.patchset | default('') }}"
      register: image_tags

    - name: Debug computed tags
      debug:
        var: image_tags

    - name: Install Docker python module for ansible docker login
      block:
        - pip:
            name: docker
            version: 4.4.4
            executable: pip3
      become: True


    - name: Make images
      when: not publish
      block:
        - make:
            chdir: "{{ zuul.project.src_dir }}"
            target: "build"
            params:
              DISTRO_SUFFIX: "{{ distro_suffix }}"
              IMAGE_NAME: "{{ image_name }}"
              IMAGE_TAG: "{{ item }}"
          with_items: "{{ image_tags.stdout_lines }}"
        - shell: "docker images"
          register: docker_images
        - debug:
            var: docker_images
        - shell: |
            docker images --format \
            '{{ '{{' }}.Repository{{ '}}' }}:{{ '{{' }}.Tag{{ '}}' }}'
          register: docker_images_formatted
          with_items: "{{ image_tags.stdout_lines }}"
          failed_when: "'{{ image_name }}:{{ item }}' not in docker_images_formatted.stdout"
      become: True

    - name: Publish images
      when: publish
      block:
        - docker_login:
            username: "{{ quay_credentials.username }}"
            password: "{{ quay_credentials.password }}"
            registry_url: "https://quay.io/api/v1/"
        - make:
            chdir: "{{ zuul.project.src_dir }}"
            target: "build"
            params:
              COMMIT: "{{ zuul.newrev | default('') }}"
              DISTRO_SUFFIX: "{{ distro_suffix }}"
              DOCKER_REGISTRY: "quay.io"
              IMAGE_NAME: "{{ image_name }}"
              IMAGE_PREFIX: "airshipit"
              IMAGE_TAG: "{{ item }}"
              PUSH_IMAGE: "true"
          with_items: "{{ image_tags.stdout_lines }}"
        - shell: "docker images"
          register: docker_images
        - debug:
            var: docker_images
        - shell: |
            docker images --format \
            '{{ '{{' }}.Repository{{ '}}' }}:{{ '{{' }}.Tag{{ '}}' }}'
          register: docker_images_formatted
          with_items: "{{ image_tags.stdout_lines }}"
          failed_when: "'{{ image_name }}:{{ item }}' not in docker_images_formatted.stdout"
      become: True
